services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: newsvine-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: newsvine-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: newsvine-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8088:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  kafka-connect:
    build:
      context: .
      dockerfile: local/kafka-connect/Dockerfile
    image: newsvine-kafka-connect:local
    container_name: newsvine-kafka-connect
    depends_on:
      - kafka
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:29092
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: newsvine-connect
      CONNECT_CONFIG_STORAGE_TOPIC: connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components

  kafka-init:
    image: confluentinc/cp-kafka:7.5.3
    container_name: newsvine-kafka-init
    depends_on:
      - kafka
    entrypoint: /bin/bash
    command: -c "cub kafka-ready -b kafka:29092 1 60 && kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic news-articles --partitions 3 --replication-factor 1 --config retention.ms=604800000 && kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic news-articles-dlq --partitions 3 --replication-factor 1 --config retention.ms=1209600000 && kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic user-interactions --partitions 3 --replication-factor 1 --config retention.ms=2592000000 && kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic search-events --partitions 3 --replication-factor 1 && kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic trending-updates --partitions 3 --replication-factor 1"

  postgres:
    image: postgres:16
    container_name: newsvine-postgres
    environment:
      POSTGRES_USER: newsvine
      POSTGRES_PASSWORD: newsvine
      POSTGRES_DB: users
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./local/postgres/init:/docker-entrypoint-initdb.d

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: newsvine-api:local
    container_name: newsvine-api
    depends_on:
      - postgres
      - redis
      - kafka
      - elasticsearch
    environment:
      APP_DATABASE_URL: postgresql+psycopg://newsvine:newsvine@postgres:5432/users
      APP_ELASTICSEARCH_URL: http://elasticsearch:9200
      APP_REDIS_URL: redis://redis:6379/0
      APP_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_NEWS_TOPIC: news-articles
      APP_USER_INTERACTIONS_TOPIC: user-interactions
      APP_TRENDING_UPDATES_TOPIC: trending-updates
      APP_NEWS_DLQ_TOPIC: news-articles-dlq
      APP_JWT_SECRET: local-dev-secret
      APP_JWT_ALGORITHM: HS256
      APP_ACCESS_TOKEN_MINUTES: 15
      APP_REFRESH_TOKEN_DAYS: 7
      APP_AUTO_CREATE_SCHEMA: "false"
    ports:
      - "8000:8000"

  news-ingestor:
    build:
      context: .
      dockerfile: Dockerfile
    image: newsvine-api:local
    container_name: newsvine-news-ingestor
    depends_on:
      - kafka
      - redis
      - kafka-init
    command:
      - python
      - -m
      - newsvine_pipeline.ingestor
    environment:
      APP_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_NEWS_TOPIC: news-articles
      APP_NEWS_DLQ_TOPIC: news-articles-dlq
      INGEST_REDIS_URL: redis://redis:6379/0
      INGEST_BLOOM_KEY: news:urlhash:bloom
      INGEST_POLL_SECONDS: 300
      INGEST_NEWSAPI_KEY: ${INGEST_NEWSAPI_KEY:-}
      INGEST_NEWSAPI_COUNTRY: ${INGEST_NEWSAPI_COUNTRY:-us}
      INGEST_NEWSAPI_CATEGORY: ${INGEST_NEWSAPI_CATEGORY:-general}

  news-consumer:
    build:
      context: .
      dockerfile: Dockerfile
    image: newsvine-api:local
    container_name: newsvine-news-consumer
    depends_on:
      - kafka
      - postgres
      - elasticsearch
      - kafka-init
      - elasticsearch-init
    command:
      - python
      - -m
      - newsvine_pipeline.consumer
    environment:
      APP_DATABASE_URL: postgresql+psycopg://newsvine:newsvine@postgres:5432/users
      APP_ELASTICSEARCH_URL: http://elasticsearch:9200
      APP_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_REDIS_URL: redis://redis:6379/0
      APP_NEWS_TOPIC: news-articles
      APP_NEWS_DLQ_TOPIC: news-articles-dlq
      CONSUMER_GROUP_ID: news-article-consumer

  trending-scorer:
    build:
      context: .
      dockerfile: Dockerfile
    image: newsvine-api:local
    container_name: newsvine-trending-scorer
    depends_on:
      - kafka
      - redis
      - kafka-init
    command:
      - python
      - -m
      - newsvine_pipeline.trending_scorer
    environment:
      APP_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_REDIS_URL: redis://redis:6379/0
      APP_USER_INTERACTIONS_TOPIC: user-interactions
      APP_TRENDING_UPDATES_TOPIC: trending-updates
      TRENDING_GROUP_ID: trending-scorer
      TRENDING_DECAY_WINDOW_SECONDS: 3600
      TRENDING_TOP_N: 50
      TRENDING_PUBLISH_INTERVAL_SECONDS: 5

  profile-updater:
    build:
      context: .
      dockerfile: Dockerfile
    image: newsvine-api:local
    container_name: newsvine-profile-updater
    depends_on:
      - kafka
      - redis
      - kafka-init
    command:
      - python
      - -m
      - newsvine_pipeline.profile_updater
    environment:
      APP_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_REDIS_URL: redis://redis:6379/0
      APP_USER_INTERACTIONS_TOPIC: user-interactions
      PROFILE_GROUP_ID: profile-updater

  interactions-consumer:
    build:
      context: .
      dockerfile: Dockerfile
    image: newsvine-api:local
    container_name: newsvine-interactions-consumer
    depends_on:
      - kafka
      - postgres
      - kafka-init
    command:
      - python
      - -m
      - newsvine_pipeline.interactions_consumer
    environment:
      APP_DATABASE_URL: postgresql+psycopg://newsvine:newsvine@postgres:5432/users
      APP_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_USER_INTERACTIONS_TOPIC: user-interactions
      INTERACTIONS_GROUP_ID: interactions-consumer

  redis:
    image: redis:7-alpine
    container_name: newsvine-redis
    command: redis-server --appendonly yes --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: newsvine-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data

  elasticsearch-init:
    image: curlimages/curl:8.7.1
    container_name: newsvine-elasticsearch-init
    depends_on:
      - elasticsearch
    volumes:
      - ./local/elasticsearch:/config
    entrypoint: /bin/sh
    command:
      - -c
      - >
        until curl -s http://elasticsearch:9200 >/dev/null; do sleep 2; done;
        curl -s -X PUT http://elasticsearch:9200/articles -H "Content-Type: application/json"
        --data-binary @/config/articles-index.json

  minio:
    image: minio/minio:latest
    container_name: newsvine-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    container_name: newsvine-minio-init
    depends_on:
      - minio
    entrypoint: /bin/sh
    command: -c "until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done; mc mb -p local/mlflow; mc mb -p local/models; exit 0"

  spark-master:
    build:
      context: .
      dockerfile: local/spark-batch/Dockerfile
    image: newsvine-spark-batch:local
    container_name: newsvine-spark-master
    profiles:
      - ml
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./:/opt/spark/work-dir

  spark-worker:
    build:
      context: .
      dockerfile: local/spark-batch/Dockerfile
    image: newsvine-spark-batch:local
    container_name: newsvine-spark-worker
    profiles:
      - ml
    depends_on:
      - spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --webui-port
      - "8081"
    ports:
      - "8081:8081"
    volumes:
      - ./:/opt/spark/work-dir

  mlflow:
    build:
      context: .
      dockerfile: local/mlflow/Dockerfile
    image: newsvine-mlflow:local
    container_name: newsvine-mlflow
    profiles:
      - ml
    depends_on:
      - postgres
      - minio
      - minio-init
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - postgresql://newsvine:newsvine@postgres:5432/mlflow
      - --artifacts-destination
      - s3://mlflow/
      - --serve-artifacts
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:
  es-data:
  minio-data:
